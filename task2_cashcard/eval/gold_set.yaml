# CashCard go-live gold set
#
# 50 questions, distributed against the contact-mix prior:
#   esim_activation: 18 (36%)
#   plan_questions:  12 (24%)
#   devices:          8 (16%)
#   roaming:          5 (10%)
#   port_in:          5 (10%)
#   other:            2 ( 4%)
#
# Each entry:
#   id:                       stable identifier (used in score reports)
#   bucket:                   contact-mix bucket
#   question:                 what the user types
#   expected_intent:          what the intent classifier should emit
#   expected_handoff_reason:  null if the agent should answer; one of HandoffReason
#                             from task1_audit if it should hand off
#   expected_grounding:       grounded / refused (the only acceptable verdicts)
#   api_facts:                flat dict of API-derived facts the runtime
#                             would lookup; eval runner feeds these to
#                             check_grounding as `api_facts`
#   golden_answer_keywords:   keywords/phrases that any acceptable answer must
#                             include. Empty list means refusal is the
#                             expected behaviour (no answer content to score).

